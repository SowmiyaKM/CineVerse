<!DOCTYPE html>
<html>
<head>

<title>Secure Checkout | CineVerse</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#111827,#020617);
    color:white;
    padding:30px;
}

.box{
    width:500px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(25px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:30px;
    padding:40px;
    box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h2{
    font-size:32px;
    background:linear-gradient(90deg,#ef4444,#ec4899);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.header p{
    color:#94a3b8;
    margin-top:10px;
}

.timer{
    text-align:center;
    font-size:42px;
    font-weight:700;
    color:#ef4444;
    margin:25px 0;
}

.seats{
    background:#1e293b;
    border-radius:18px;
    padding:20px;
    margin-bottom:25px;
}

.seats h3{
    margin-bottom:15px;
}

.seat-item{
    background:rgba(255,255,255,0.05);
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
}

input[type="email"]{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    background:#1e293b;
    color:white;
    font-size:15px;
    margin-top:20px;
    outline:none;
}

input[type="email"]::placeholder{
    color:#94a3b8;
}

.pay-btn{
    width:100%;
    margin-top:30px;
    padding:18px;
    border:none;
    border-radius:16px;
    background:linear-gradient(90deg,#22c55e,#16a34a);
    color:white;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.pay-btn:hover{
    transform:translateY(-4px);
}

.error{
    text-align:center;
    color:#ef4444;
    margin-top:20px;
    display:none;
}

.toast{
    position:fixed;
    top:30px;
    right:30px;
    min-width:320px;
    padding:18px 24px;
    border-radius:18px;
    color:white;
    font-weight:500;
    box-shadow:0 20px 50px rgba(0,0,0,0.35);
    backdrop-filter:blur(20px);
    display:none;
    z-index:9999;
    animation:slideIn 0.4s ease;
}

.toast.success{
    background:rgba(34,197,94,0.95);
}

.toast.error{
    background:rgba(239,68,68,0.95);
}

.toast.warning{
    background:rgba(245,158,11,0.95);
}

@keyframes slideIn{

    from{
        opacity:0;
        transform:translateX(100px);
    }

    to{
        opacity:1;
        transform:translateX(0);
    }

}

.security{
    text-align:center;
    margin-top:25px;
    color:#94a3b8;
    font-size:14px;
}

</style>

</head>

<body>


<div class="box">

<div class="header">

<h2>🎟 Confirm Your Booking</h2>

<p>Secure payment powered by Razorpay</p>

</div>


<div class="timer" id="timer">

02:00

</div>


<form id="seatForm">

{% csrf_token %}

<div class="seats">

<h3>Selected Seats</h3>

{% for seat in seats %}

<input type="hidden" name="seats" value="{{ seat.id }}">

<div class="seat-item">

🎫 {{ seat.seat_number }}

</div>

{% endfor %}

</div>


<input
type="email"
id="customerEmail"
placeholder="Enter your email address"
required
>

</form>


<button
type="button"
id="payBtn"
class="pay-btn"
>

💳 Pay & Book Tickets

</button>


<p id="errorMsg" class="error">

Payment data missing

</p>


<div class="security">

🔒 Secure Checkout • Encrypted Payment • Instant Email Confirmation

</div>

</div>

<script>
    function showToast(message,type="error"){

    const toast=document.getElementById("toast");

    toast.className="toast "+type;

    toast.innerText=message;

    toast.style.display="block";

    setTimeout(function(){

        toast.style.display="none";

    },2500);

}


/* TIMER */

let timeLeft = 120;

const timerInterval = setInterval(function(){

   if(timeLeft <= 0){

    clearInterval(timerInterval);

    document.getElementById("timer").innerText="00:00";

    showToast(
        "⏰ Reservation expired! Redirecting to home...",
        "warning"
    );

    setTimeout(function(){

        window.location.href="/";

    },2500);

    return;

}

    let m = Math.floor(timeLeft / 60);
    let s = timeLeft % 60;

    document.getElementById("timer").innerText =
        String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");

    timeLeft--;

},1000);


/* PAYMENT */

document.getElementById("payBtn").addEventListener("click",function(){

    const email=document.getElementById("customerEmail").value;

    if(!email){

     showToast("Please enter your email address");
        return;

    }

    const orderId="{{ order_id|default:'' }}";
    const amount=Number("{{ amount|default:'' }}");
    const key="{{ RAZORPAY_KEY_ID|default:'' }}";

    if(!orderId){

        document.getElementById("errorMsg").style.display="block";
        return;

    }

    const seatIds=[
    {% for seat in seats %}
        "{{ seat.id }}"{% if not forloop.last %},{% endif %}
    {% endfor %}
    ];

    const options={

        key:key,
        amount:amount,
        currency:"INR",
        order_id:orderId,

        name:"CineVerse",
        description:"Movie Ticket Purchase",

        prefill:{
            name:"Movie Lover",
            email:email,
            contact:"9876543210"
        },

        theme:{
            color:"#ec4899"
        },

        handler:function(response){

            fetch("/booking/confirm/{{ show_id }}/",{

                method:"POST",

                headers:{
                    "Content-Type":"application/x-www-form-urlencoded",
                    "X-CSRFToken":"{{ csrf_token }}"
                },

                body:new URLSearchParams({
                    "seats":seatIds,
                    "email":email,
                    "payment_id":response.razorpay_payment_id
                })

            })
            .then(()=>window.location.href="/");

        }

    };

    const rzp=new Razorpay(options);

    rzp.on("payment.failed",function(){

        showToast("Payment failed. Please try again.");

    });

    rzp.open();

});

</script>
<div id="toast" class="toast"></div>
</body>
</html>
