<!DOCTYPE html>
<html>
<head>

<title>Secure Checkout | CineVerse</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* YOUR CSS UNCHANGED */
</style>

</head>

<body>

<div class="box">

<div class="header">
<h2>🎟 Confirm Your Booking</h2>
<p>Secure payment powered by Razorpay</p>
</div>

<div class="timer" id="timer">02:00</div>

<form id="seatForm">
{% csrf_token %}

<div class="seats">
<h3>Selected Seats</h3>

{% for seat in seats %}
<input type="hidden" name="seats" value="{{ seat.id }}">

<div class="seat-item">
🎫 {{ seat.seat_number }}
</div>
{% endfor %}
</div>

<input
type="email"
id="customerEmail"
placeholder="Enter your email address"
required
>

</form>

<button type="button" id="payBtn" class="pay-btn">
💳 Pay & Book Tickets
</button>

<p id="errorMsg" class="error">Payment data missing</p>

<div class="security">
🔒 Secure Checkout • Encrypted Payment • Instant Email Confirmation
</div>

</div>

<div id="toast" class="toast"></div>

<script>

document.addEventListener("DOMContentLoaded", function () {

/* ---------------- TOAST ---------------- */
function showToast(message,type="error"){
    const toast=document.getElementById("toast");
    toast.className="toast "+type;
    toast.innerText=message;
    toast.style.display="block";

    setTimeout(function(){
        toast.style.display="none";
    },2500);
}


/* ---------------- TIMER ---------------- */
let timeLeft = 120;

const timerInterval = setInterval(function(){

   if(timeLeft <= 0){

    clearInterval(timerInterval);

    document.getElementById("timer").innerText="00:00";

    showToast("⏰ Reservation expired! Redirecting...","warning");

    setTimeout(function(){
        window.location.href="/";
    },2500);

    return;
}

    let m = Math.floor(timeLeft / 60);
    let s = timeLeft % 60;

    document.getElementById("timer").innerText =
        String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");

    timeLeft--;

},1000);


/* ---------------- PAYMENT ---------------- */
document.getElementById("payBtn").addEventListener("click",function(){

    const email=document.getElementById("customerEmail").value;

    if(!email){
        showToast("Please enter your email address");
        return;
    }

    const orderId="{{ order_id|default:'' }}";
    const amount=Number("{{ amount|default:'' }}");
    const key="{{ RAZORPAY_KEY_ID|default:'' }}";

    if(!orderId){
        document.getElementById("errorMsg").style.display="block";
        return;
    }

    const seatIds=[
    {% for seat in seats %}
        "{{ seat.id }}"{% if not forloop.last %},{% endif %}
    {% endfor %}
    ];

    const options={

        key:key,
        amount:amount,
        currency:"INR",
        order_id:orderId,

        name:"CineVerse",
        description:"Movie Ticket Purchase",

        prefill:{
            name:"Movie Lover",
            email:email,
            contact:"9876543210"
        },

        theme:{ color:"#ec4899" },

        handler:function(response){

            clearInterval(timerInterval);

            showToast("✅ Payment successful! Redirecting...","success");

            const formData = new URLSearchParams();

            seatIds.forEach(function(seat){
                formData.append("seats", seat);
            });

            formData.append("email", email);
            formData.append("payment_id", response.razorpay_payment_id);

            fetch("/booking/confirm/{{ show_id }}/",{

                method:"POST",
                headers:{
                    "Content-Type":"application/x-www-form-urlencoded"
                },
                body:formData

            })
            .then(function(){
                window.location.replace("/");
            })
            .catch(function(){
                showToast("Server error.");
            });

        }

    };

    const rzp=new Razorpay(options);

    rzp.on("payment.failed",function(){
        showToast("Payment failed. Please try again.");
    });

    rzp.open();

});

});

</script>

</body>
</html>
